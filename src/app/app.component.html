<div class="min-h-screen flex flex-col relative overflow-hidden bg-ivory text-choco-dark font-sans selection:bg-gold-light selection:text-choco-dark">
  <app-navbar></app-navbar>

  <main class="flex-grow pt-20">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-choco-dark text-cream py-8 border-t border-gold/20 mt-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
      <div class="mb-4 md:mb-0 text-center md:text-left flex flex-col items-center md:items-start">
        <div class="flex items-center space-x-3">
          <img src="assets/logo.png" alt="Crown Logo" class="h-8 w-auto grayscale opacity-80" />
          <span class="font-serif text-2xl tracking-widest text-gold block">CROWN</span>
        </div>
        <span class="text-sm text-cream/70 mt-2 block">Artisanal Premium Chocolates</span>
      </div>
      <div class="text-sm text-cream/70 text-center md:text-right">
        &copy; 2026 Crown Premium. All rights reserved.<br/>
        <a href="#" class="hover:text-gold transition-colors">Privacy Policy</a> | <a href="#" class="hover:text-gold transition-colors">Terms of Service</a>
      </div>
    </div>
  </footer>

  <!-- Sidebar Cart -->
  @if (cartService.isCartOpen()) {
    <app-cart class="fixed inset-y-0 right-0 z-50 w-full md:w-[400px] shadow-2xl transition-transform duration-300"></app-cart>
    
    <!-- Backdrop -->
    <div 
      class="fixed inset-0 bg-choco-dark/40 backdrop-blur-sm z-40 transition-opacity duration-300"
      (click)="cartService.toggleCart()">
    </div>
  }

  <!-- Auth Modal -->
  @if (authService.isAuthModalOpen()) {
    <app-auth class="fixed inset-0 z-[60] flex items-center justify-center p-4 sm:p-0"></app-auth>
    
    <!-- Backdrop for Auth -->
    <div 
      class="fixed inset-0 bg-choco-dark/60 backdrop-blur-md z-50 transition-opacity duration-300"
      (click)="authService.closeModal()">
    </div>
  }
</div>
