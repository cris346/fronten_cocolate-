<nav class="bg-[rgb(161,127,12)]/95 backdrop-blur-md fixed w-full z-30 top-0 shadow-lg transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-20 items-center">
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center cursor-pointer space-x-3" routerLink="/">
        <img src="assets/logo.png" alt="Crown Logo" class="h-10 w-auto object-contain" />
        <span class="font-serif text-2xl sm:text-3xl tracking-widest text-white hover:text-cream transition-colors duration-300">
          CROWN
        </span>
      </div>

      <!-- Navigation links -->
      <div class="hidden md:ml-6 md:flex md:space-x-8 items-center">
        <a routerLink="/" class="text-white hover:text-choco-dark px-3 py-2 text-sm uppercase tracking-widest font-medium transition-colors duration-300">Inicio</a>
        <a routerLink="/customize" class="text-white hover:text-choco-dark px-3 py-2 text-sm uppercase tracking-widest font-medium transition-colors duration-300">Productos</a>
        <a routerLink="/about" class="text-white hover:text-choco-dark px-3 py-2 text-sm uppercase tracking-widest font-medium transition-colors duration-300">Nosotros</a>
      </div>

      <!-- Right side buttons -->
      <div class="flex items-center space-x-4 sm:space-x-6">
        
        <!-- Auth Button -->
        @if (authService.isAuthenticated()) {
          <button (click)="authService.logout()" class="text-white hover:text-choco-dark flex items-center transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span class="hidden sm:inline text-sm">Salir</span>
          </button>
        } @else {
          <button (click)="authService.toggleModal()" class="text-white hover:text-choco-dark flex items-center transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <span class="hidden sm:inline text-sm">Entrar</span>
          </button>
        }

        <!-- Cart Toggle -->
        <button (click)="cartService.toggleCart()" class="text-white hover:text-choco-dark relative transition-colors duration-300 p-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
          @if (cartService.cartCount() > 0) {
            <span class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-choco-dark bg-gold rounded-full transform translate-x-1/4 -translate-y-1/4">
              {{ cartService.cartCount() }}
            </span>
          }
        </button>

      </div>
    </div>
  </div>
</nav>
